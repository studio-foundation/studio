brief_summary: "Un soufflé au chocolat parfait pour 12 personnes, sans four, sans œufs, sans chocolat, en moins de 10 minutes, avec uniquement des ingrédients dollar store."
cuisine: french_patisserie
constraints:
  - "Pas de four (j'en ai pas)"
  - "Pas d'œufs (allergie)"
  - "Pas de chocolat (allergie aussi)"
  - "Pas de crème (intolérance lactose)"
  - "Budget maximum 5$ pour 12 personnes"
  - "Prêt en moins de 10 minutes, incluant la préparation"
  - "Doit avoir la texture aérée d'un vrai soufflé"
  - "Zéro substitut artificiel (pas de poudre protéinée, pas de gomme xanthane)"
difficulty: easy
servings: 12
notes: "J'ai un micro-ondes, une cuillère en bois et un bol. C'est tout."