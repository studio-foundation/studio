      requirements:
        - "Display FAQ with accordion expand/collapse"
        - "Match existing page typography and spacing"
      acceptance_criteria:
        - "FAQ section renders on About page"
        - "Each item expands/collapses on click"
        - "Style matches existing design"
    tool_calls: []

  implementation-plan:
