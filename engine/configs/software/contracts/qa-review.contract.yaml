name: qa-review
version: 1
schema:
  required_fields:
    - status
    - summary
    - issues
post_validation:
  rejection_detection:
    field: status
    approved_values:
      - approved
      - approved_with_notes
      - success
    rejected_values:
      - rejected
      - failed
      - implementation_incomplete
    details_field: issues
    summary_field: summary
