
name: two-stage
description: Two stage pipeline
version: 1
stages:
  - name: stage-1
    kind: analysis
    agent: test-agent
    ralph:
      max_attempts: 1
      retry_strategy: none
    context:
      include:
        - input
  - name: stage-2
    kind: planning
    agent: test-agent
    ralph:
      max_attempts: 1
      retry_strategy: none
    context:
      include:
        - input
        - previous_stage_output
