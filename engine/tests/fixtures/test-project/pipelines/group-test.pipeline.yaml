
name: group-test
description: Test pipeline with a feedback loop group
version: 2
stages:
  - name: analysis
    kind: analysis
    agent: test-agent
    ralph:
      max_attempts: 1
      retry_strategy: none
    context:
      include:
        - input
  - group: impl-review
    max_iterations: 3
    stages:
      - name: code-gen
        kind: code_generation
        agent: test-agent
        contract: code-gen
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
            - all_stage_outputs
            - group_feedback
      - name: qa-review
        kind: qa
        agent: test-agent
        contract: qa-gate
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
            - all_stage_outputs
