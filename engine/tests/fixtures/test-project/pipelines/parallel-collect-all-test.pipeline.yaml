
name: parallel-collect-all-test
description: Test pipeline with collect-all parallel group
version: 1
stages:
  - group: parallel-work
    mode: parallel
    on_failure: collect-all
    stages:
      - name: stage-a
        kind: analysis
        agent: test-agent
        contract: basic-result
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
      - name: stage-b
        kind: analysis
        agent: test-agent
        contract: strict-result
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
      - name: stage-c
        kind: analysis
        agent: test-agent
        contract: basic-result
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
