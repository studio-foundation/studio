
name: parallel-then-sequential-test
description: Test pipeline with parallel group followed by sequential stage
version: 1
stages:
  - group: parallel-work
    mode: parallel
    stages:
      - name: stage-a
        kind: analysis
        agent: test-agent
        contract: basic-result
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
      - name: stage-b
        kind: analysis
        agent: test-agent
        contract: basic-result
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
  - name: merge-results
    kind: merge
    agent: test-agent
    contract: basic-result
    ralph:
      max_attempts: 1
      retry_strategy: none
    context:
      include:
        - all_stage_outputs
