
name: group-simple
description: Pipeline with a simple group for cancellation testing
version: 1
stages:
  - group: review-loop
    max_iterations: 2
    stages:
      - name: review-stage-1
        kind: analysis
        agent: test-agent
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
      - name: review-stage-2
        kind: analysis
        agent: test-agent
        ralph:
          max_attempts: 1
          retry_strategy: none
        context:
          include:
            - input
