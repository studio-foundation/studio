
name: hook-reject-on-failure
description: Pipeline where on_stage_complete hook fails and rejects the stage
version: 1
stages:
  - name: analysis
    kind: analysis
    agent: test-agent
    contract: test-contract
    hooks:
      on_stage_complete:
        - command: "sh -c 'echo hook-error-output >&2; exit 1'"
          on_failure: reject
    ralph:
      max_attempts: 1
      retry_strategy: none
    context:
      include:
        - input
