name: feature-builder
description: Analyze a request and generate code changes
version: 1

input_schema:
  type: structured
  fields:
    - name: brief_summary
      type: text
      required: true
      prompt: "Brief summary"
    - name: target_page
      type: text
      required: false
      prompt: "Target page (optional)"
    - name: acceptance_criteria
      type: array
      items: text
      prompt: "Acceptance criteria"

stages:
  - name: code-generation
    kind: code
    agent: coder
    ralph:
      max_attempts: 3
    context:
      include:
        - input
