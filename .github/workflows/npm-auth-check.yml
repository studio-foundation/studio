name: Check npm auth

# Immutable releases reserve a tag name permanently, so a release that fails to
# publish burns a version number. Run this first to verify NPM_TOKEN can publish.
on:
  workflow_dispatch:

jobs:
  check:
    name: Verify NPM_TOKEN can publish @studio-foundation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: |
          npm whoami
          npm access list packages @studio-foundation
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
