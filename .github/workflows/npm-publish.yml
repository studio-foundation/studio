name: Publish to npm

on:
  release:
    types: [created]
  # Immutable releases reserve a tag name permanently, so a release that fails to
  # publish burns a version. Publish manually first, then cut the release.
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 0.5.2)
        required: true

jobs:
  publish:
    name: Publish @studio packages
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Determine version and dist-tag
        id: dist-tag
        run: |
          VERSION="${{ inputs.version || github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event.release.prerelease }}" == "true" || "$VERSION" == *"-"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump all package versions to match release tag
        run: pnpm -r exec npm version ${{ steps.dist-tag.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish packages (dependency order)
        run: |
          pnpm --filter @studio-foundation/contracts publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/anonymizer publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/ralph publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/runner publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/engine publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/api publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
          pnpm --filter @studio-foundation/cli publish --access public --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
