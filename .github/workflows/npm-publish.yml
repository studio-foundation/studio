name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    name: Publish @studio packages
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish packages (dependency order)
        run: |
          pnpm --filter @studio-foundation/contracts publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/anonymizer publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/ralph publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/runner publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/engine publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/api publish --access public --no-git-checks --tag beta
          pnpm --filter @studio-foundation/cli publish --access public --no-git-checks --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
