name: code-generation
version: 1

schema:
  required_fields:
    - summary
    - files_changed

# Item-level constraints are not part of the declarative schema — use an
# external validator against the real output if you need them:
#
# validators:
#   - name: files-changed-shape
#     command: "jq -e '.files_changed | length >= 1 and all(has(\"path\") and has(\"action\") and has(\"content\"))'"

tool_calls:
  minimum: 1
  required_tools:
    - repo_manager.write_file

custom_rules:
  - name: no-theatre
    description: "Agent must actually call tools, not just describe calling them"
    check: "tool_calls_count > 0 OR stage_kind != code_generation"
