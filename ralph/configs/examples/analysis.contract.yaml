name: analysis
version: 1

schema:
  required_fields:
    - summary
    - recommendations

# Constraints beyond required_fields (lengths, item counts, types) are not
# part of the declarative schema — express them as external validators, which
# run against the real output inside the RALPH loop:
#
# validators:
#   - name: min-content
#     command: "jq -e '(.summary | length >= 50) and (.recommendations | length >= 1)'"

tool_calls:
  minimum: 0  # Analysis doesn't require tool calls

custom_rules:
  - name: actionable-recommendations
    description: "Recommendations must be specific and actionable"
    check: "recommendations.length > 0"
